<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Les Contemporains | Publications</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rouge: #c8102e;
      --noir: #111111;
      --gris: #f0f0f0;
      --blanc: #ffffff;
      --texte: #222222;
      --texte-leger: #666666;
    }
    body { font-family: 'Source Sans 3', sans-serif; background-color: var(--gris); color: var(--texte); }

    nav { background-color: var(--noir); padding: 0 48px; display: flex; align-items: center; justify-content: space-between; height: 68px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 16px rgba(0,0,0,0.5); }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: var(--blanc); text-decoration: none; letter-spacing: 1px; }
    .nav-logo span { color: var(--rouge); }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a { color: #bbb; text-decoration: none; font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.3px; padding: 8px 18px; border-radius: 4px; transition: all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--blanc); background-color: var(--rouge); }

    .page-header { background-color: var(--noir); color: var(--blanc); text-align: center; padding: 50px 20px 40px; border-bottom: 5px solid var(--rouge); }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 900; }

    .admin-bar { max-width: 960px; margin: 24px auto 0; padding: 0 20px; display: flex; justify-content: flex-end; }
    .btn-admin { background: none; border: 2px solid #ccc; color: #999; padding: 6px 16px; border-radius: 20px; font-size: 0.8rem; font-weight: 600; cursor: pointer; transition: all 0.2s; font-family: inherit; }
    .btn-admin:hover { border-color: var(--rouge); color: var(--rouge); }
    .btn-admin.active { border-color: var(--rouge); background: var(--rouge); color: white; }

    .toolbar { max-width: 960px; margin: 16px auto 0; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; }
    .toolbar input { flex: 1; min-width: 200px; padding: 11px 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.95rem; font-family: inherit; outline: none; background: var(--blanc); transition: border-color 0.2s; }
    .toolbar input:focus { border-color: var(--rouge); }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filters button { background: var(--blanc); border: 2px solid #e0e0e0; color: var(--texte); padding: 9px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.82rem; transition: all 0.2s; font-family: inherit; }
    .filters button:hover, .filters button.active { background: var(--rouge); border-color: var(--rouge); color: white; }

    .articles { max-width: 960px; margin: 24px auto 60px; padding: 0 20px; display: flex; flex-direction: column; gap: 14px; }

    .article-card { background: var(--blanc); border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, border-left-color 0.2s; border-left: 4px solid transparent; display: flex; flex-direction: column; }
    .article-card:hover { transform: translateX(4px); box-shadow: 0 8px 28px rgba(0,0,0,0.11); border-left-color: var(--rouge); }
    .card-body { padding: 22px 24px 16px; }
    .card-tag { background: var(--rouge); color: white; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 3px 10px; border-radius: 2px; display: inline-block; margin-bottom: 10px; }
    .article-card h3 { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--noir); margin-bottom: 6px; line-height: 1.4; }
    .article-card .meta { font-size: 0.8rem; color: #aaa; margin-bottom: 10px; }
    .article-card p { color: var(--texte-leger); font-size: 0.93rem; line-height: 1.6; }
    .card-actions { padding: 12px 24px; border-top: 1px solid #f0f0f0; display: none; gap: 10px; }
    .card-actions.visible { display: flex; }
    .btn-edit { background: #f0f0f0; color: var(--texte); border: none; padding: 7px 16px; border-radius: 6px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.2s; }
    .btn-edit:hover { background: #e0e0e0; }
    .btn-delete { background: #fff0f0; color: var(--rouge); border: 1px solid #ffcccc; padding: 7px 16px; border-radius: 6px; font-size: 0.82rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: all 0.2s; }
    .btn-delete:hover { background: var(--rouge); color: white; border-color: var(--rouge); }
    .empty-msg { text-align: center; color: var(--texte-leger); padding: 60px 0; font-size: 1.1rem; }

    /* MODAL STYLE LE MONDE */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 200; display: none; }
    .overlay.show { display: block; }
    .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 94%; max-width: 740px; max-height: 90vh; overflow-y: auto; background: var(--blanc); border-radius: 4px; z-index: 201; display: none; box-shadow: 0 40px 100px rgba(0,0,0,0.4); }
    .modal.show { display: block; }
    .modal-header { padding: 36px 48px 24px; border-bottom: 2px solid #111; }
    .modal-tag { background: var(--rouge); color: white; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; padding: 4px 12px; display: inline-block; margin-bottom: 18px; }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 3vw, 2.2rem); color: var(--noir); line-height: 1.25; margin-bottom: 20px; font-weight: 900; }
    .modal-meta { display: flex; align-items: center; gap: 12px; font-size: 0.82rem; color: #999; }
    .modal-meta .auteur { font-weight: 700; color: var(--texte); font-size: 0.88rem; text-transform: uppercase; letter-spacing: 0.5px; }
    .modal-meta .separator { color: #ddd; }
    .modal-body { padding: 32px 48px 48px; }
    .modal-chapeau { font-size: 1.12rem; font-weight: 600; color: var(--texte); line-height: 1.65; margin-bottom: 28px; padding-bottom: 24px; border-bottom: 1px solid #eee; font-family: 'Playfair Display', serif; font-style: italic; }
    .modal-content { font-size: 1.02rem; line-height: 2; color: #333; white-space: pre-wrap; font-weight: 300; }
    .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; font-size: 1.5rem; cursor: pointer; color: #bbb; line-height: 1; transition: color 0.2s; z-index: 10; }
    .modal-close:hover { color: var(--rouge); }

    /* MODAL MOT DE PASSE */
    .pwd-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 380px; background: var(--blanc); border-radius: 14px; z-index: 300; display: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 36px; text-align: center; }
    .pwd-modal.show { display: block; }
    .pwd-modal h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 8px; }
    .pwd-modal p { color: var(--texte-leger); font-size: 0.9rem; margin-bottom: 20px; }
    .pwd-modal input { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; font-family: inherit; outline: none; text-align: center; letter-spacing: 4px; margin-bottom: 12px; }
    .pwd-modal input:focus { border-color: var(--rouge); }
    .pwd-modal .btn-confirm { width: 100%; background: var(--rouge); color: white; border: none; padding: 13px; border-radius: 8px; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; margin-bottom: 10px; transition: background 0.2s; }
    .pwd-modal .btn-confirm:hover { background: #a30d25; }
    .pwd-modal .btn-cancel { width: 100%; background: none; color: #aaa; border: none; padding: 8px; font-size: 0.9rem; cursor: pointer; font-family: inherit; }
    .pwd-modal .btn-cancel:hover { color: var(--texte); }
    .pwd-error { color: var(--rouge); font-size: 0.85rem; margin-bottom: 10px; display: none; }

    /* MODAL MODIFIER */
    .edit-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 700px; max-height: 90vh; overflow-y: auto; background: var(--blanc); border-radius: 14px; z-index: 300; display: none; box-shadow: 0 20px 60px rgba(0,0,0,0.3); padding: 40px; }
    .edit-modal.show { display: block; }
    .edit-modal h3 { font-family: 'Playfair Display', serif; font-size: 1.5rem; margin-bottom: 24px; }
    .edit-modal label { display: block; font-weight: 600; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; margin-top: 16px; }
    .edit-modal input, .edit-modal textarea, .edit-modal select { width: 100%; padding: 11px 14px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 0.97rem; font-family: inherit; outline: none; transition: border-color 0.2s; }
    .edit-modal input:focus, .edit-modal textarea:focus, .edit-modal select:focus { border-color: var(--rouge); }
    .edit-modal textarea { height: 180px; resize: vertical; }
    .edit-actions { display: flex; gap: 12px; margin-top: 24px; }
    .btn-save { flex: 1; background: var(--rouge); color: white; border: none; padding: 13px; border-radius: 8px; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer; transition: background 0.2s; }
    .btn-save:hover { background: #a30d25; }
    .btn-cancel-edit { flex: 1; background: #f0f0f0; color: var(--texte); border: none; padding: 13px; border-radius: 8px; font-size: 1rem; font-weight: 600; font-family: inherit; cursor: pointer; transition: background 0.2s; }
    .btn-cancel-edit:hover { background: #e0e0e0; }

    footer { background-color: var(--noir); color: #555; padding: 28px; text-align: center; font-size: 0.82rem; border-top: 3px solid var(--rouge); }
    footer span { color: var(--rouge); }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="index.html">Les <span>Contemporains</span></a>
    <div class="nav-links">
      <a href="index.html">Accueil</a>
      <a href="publications.html" class="active">Publications</a>
      <a href="publier.html">Publier</a>
    </div>
  </nav>

  <div class="page-header">
    <h1>Publications</h1>
  </div>

  <div class="admin-bar">
    <button class="btn-admin" id="adminToggle" onclick="toggleAdmin()">🔒 Mode admin</button>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍 Rechercher un article...">
    <div class="filters">
      <button class="active" onclick="setFilter('Tous', this)">Tous</button>
      <button onclick="setFilter('Politique', this)">Politique</button>
      <button onclick="setFilter('Société', this)">Société</button>
      <button onclick="setFilter('Économie', this)">Économie</button>
      <button onclick="setFilter('Science', this)">Science</button>
      <button onclick="setFilter('Histoire', this)">Histoire</button>
      <button onclick="setFilter('Autre', this)">Autre</button>
    </div>
  </div>

  <div class="articles" id="articles">
    <p class="empty-msg">Chargement des articles...</p>
  </div>

  <!-- Overlay article -->
  <div class="overlay" id="overlay" onclick="closeModal()"></div>

  <!-- Modal article style Le Monde -->
  <div class="modal" id="modal">
    <button class="modal-close" onclick="closeModal()">&times;</button>
    <div class="modal-header">
      <span class="modal-tag" id="modalTag"></span>
      <h2 id="modalTitle"></h2>
      <div class="modal-meta">
        <span class="auteur" id="modalAuteur"></span>
        <span class="separator">|</span>
        <span id="modalDate"></span>
      </div>
    </div>
    <div class="modal-body">
      <p class="modal-chapeau" id="modalChapeau"></p>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <!-- Modal mot de passe -->
  <div class="overlay" id="overlayPwd"></div>
  <div class="pwd-modal" id="pwdModal">
    <h3>🔐 Accès admin</h3>
    <p>Entrez le mot de passe pour continuer</p>
    <p class="pwd-error" id="pwdError">Mot de passe incorrect</p>
    <input type="password" id="pwdInput" placeholder="••••" maxlength="20">
    <button class="btn-confirm" onclick="confirmPassword()">Confirmer</button>
    <button class="btn-cancel" onclick="cancelPassword()">Annuler</button>
  </div>

  <!-- Modal modifier -->
  <div class="overlay" id="overlayEdit"></div>
  <div class="edit-modal" id="editModal">
    <h3>✏️ Modifier l'article</h3>
    <input type="hidden" id="editId">
    <label>Titre</label>
    <input type="text" id="editTitre">
    <label>Auteur</label>
    <input type="text" id="editAuteur">
    <label>Catégorie</label>
    <select id="editType">
      <option value="Politique">Politique</option>
      <option value="Société">Société</option>
      <option value="Économie">Économie</option>
      <option value="Science">Science</option>
      <option value="Histoire">Histoire</option>
      <option value="Autre">Autre</option>
    </select>
    <label>Contenu</label>
    <textarea id="editContenu"></textarea>
    <div class="edit-actions">
      <button class="btn-cancel-edit" onclick="closeEditModal()">Annuler</button>
      <button class="btn-save" onclick="saveEdit()">Enregistrer</button>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 <span>Les Contemporains</span> — Tous droits réservés.</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBSgloqKAOZ1GuV79czpOR3trBtipbM52E",
      authDomain: "les-contemporains-662a6.firebaseapp.com",
      projectId: "les-contemporains-662a6",
      storageBucket: "les-contemporains-662a6.firebasestorage.app",
      messagingSenderId: "430635541529",
      appId: "1:430635541529:web:c0de908b274aee31a3b688"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const container = document.getElementById('articles');

    let allArticles = [];
    let currentFilter = 'Tous';
    let adminMode = false;
    let pendingAction = null;

    const MOT_DE_PASSE = '1234';

    async function charger() {
      try {
        const q = query(collection(db, "articles"), orderBy("date", "desc"));
        const snap = await getDocs(q);
        allArticles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        afficher();
      } catch (err) {
        console.error(err);
        container.innerHTML = '<p class="empty-msg">Erreur lors du chargement.</p>';
      }
    }

    function afficher() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      let liste = allArticles;
      if (currentFilter !== 'Tous') liste = liste.filter(a => a.type === currentFilter);
      if (search) liste = liste.filter(a => a.titre.toLowerCase().includes(search) || a.contenu.toLowerCase().includes(search));

      container.innerHTML = '';
      if (!liste.length) { container.innerHTML = '<p class="empty-msg">Aucun article trouvé.</p>'; return; }

      liste.forEach(a => {
        const date = a.date?.toDate ? a.date.toDate().toLocaleDateString('fr-FR') : '';
        const card = document.createElement('div');
        card.className = 'article-card';

        card.innerHTML = `
          <div class="card-body">
            <span class="card-tag">${a.type || 'Article'}</span>
            <h3>${a.titre}</h3>
            <p class="meta">✍️ ${a.auteur} &nbsp;·&nbsp; ${date}</p>
            <p>${a.contenu.substring(0, 200)}...</p>
          </div>
          <div class="card-actions ${adminMode ? 'visible' : ''}" id="actions-${a.id}">
            <button class="btn-edit" onclick="event.stopPropagation(); askEdit('${a.id}')">✏️ Modifier</button>
            <button class="btn-delete" onclick="event.stopPropagation(); askDelete('${a.id}')">🗑️ Supprimer</button>
          </div>
        `;

        card.querySelector('.card-body').addEventListener('click', () => openModal(a));
        container.appendChild(card);
      });
    }

    // ── ADMIN ──
    window.toggleAdmin = function() {
      if (!adminMode) {
        pendingAction = { type: 'toggle' };
        showPwdModal();
      } else {
        adminMode = false;
        document.getElementById('adminToggle').classList.remove('active');
        document.getElementById('adminToggle').textContent = '🔒 Mode admin';
        afficher();
      }
    };

    // ── MOT DE PASSE ──
    function showPwdModal() {
      document.getElementById('pwdInput').value = '';
      document.getElementById('pwdError').style.display = 'none';
      document.getElementById('pwdModal').classList.add('show');
      document.getElementById('overlayPwd').style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:299;display:block;';
      setTimeout(() => document.getElementById('pwdInput').focus(), 100);
    }

    window.confirmPassword = function() {
      const val = document.getElementById('pwdInput').value;
      if (val !== MOT_DE_PASSE) {
        document.getElementById('pwdError').style.display = 'block';
        document.getElementById('pwdInput').value = '';
        return;
      }
      closePwdModal();
      if (!pendingAction) return;

      if (pendingAction.type === 'toggle') {
        adminMode = true;
        document.getElementById('adminToggle').classList.add('active');
        document.getElementById('adminToggle').textContent = '🔓 Admin actif';
        afficher();
      } else if (pendingAction.type === 'delete') {
        doDelete(pendingAction.id);
      } else if (pendingAction.type === 'edit') {
        doEdit(pendingAction.id);
      }
      pendingAction = null;
    };

    window.cancelPassword = function() {
      closePwdModal();
      pendingAction = null;
    };

    function closePwdModal() {
      document.getElementById('pwdModal').classList.remove('show');
      document.getElementById('overlayPwd').style.display = 'none';
    }

    document.getElementById('pwdInput').addEventListener('keydown', e => { if (e.key === 'Enter') window.confirmPassword(); });

    // ── SUPPRIMER ──
    window.askDelete = function(id) {
      pendingAction = { type: 'delete', id };
      showPwdModal();
    };

    async function doDelete(id) {
      if (!confirm('Supprimer cet article définitivement ?')) return;
      try {
        await deleteDoc(doc(db, "articles", id));
        allArticles = allArticles.filter(a => a.id !== id);
        afficher();
      } catch (err) {
        console.error(err);
        alert('Erreur lors de la suppression.');
      }
    }

    // ── MODIFIER ──
    window.askEdit = function(id) {
      pendingAction = { type: 'edit', id };
      showPwdModal();
    };

    function doEdit(id) {
      const a = allArticles.find(x => x.id === id);
      if (!a) return;
      document.getElementById('editId').value = id;
      document.getElementById('editTitre').value = a.titre;
      document.getElementById('editAuteur').value = a.auteur;
      document.getElementById('editType').value = a.type;
      document.getElementById('editContenu').value = a.contenu;
      document.getElementById('editModal').classList.add('show');
      document.getElementById('overlayEdit').style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:299;display:block;';
    }

    window.saveEdit = async function() {
      const id = document.getElementById('editId').value;
      const titre = document.getElementById('editTitre').value.trim();
      const auteur = document.getElementById('editAuteur').value.trim();
      const type = document.getElementById('editType').value;
      const contenu = document.getElementById('editContenu').value.trim();

      if (!titre || !auteur || !contenu) { alert('Remplissez tous les champs.'); return; }

      try {
        await updateDoc(doc(db, "articles", id), { titre, auteur, type, contenu });
        const idx = allArticles.findIndex(a => a.id === id);
        if (idx !== -1) { allArticles[idx] = { ...allArticles[idx], titre, auteur, type, contenu }; }
        closeEditModal();
        afficher();
      } catch (err) {
        console.error(err);
        alert('Erreur lors de la modification.');
      }
    };

    window.closeEditModal = function() {
      document.getElementById('editModal').classList.remove('show');
      document.getElementById('overlayEdit').style.display = 'none';
    };

    // ── MODAL ARTICLE ──
    window.openModal = function(a) {
      const date = a.date?.toDate ? a.date.toDate().toLocaleDateString('fr-FR', { year: 'numeric', month: 'long', day: 'numeric' }) : '';
      const contenu = a.contenu || '';
      const paragraphes = contenu.split('\n\n').filter(p => p.trim());
      const chapeau = paragraphes[0] || '';
      const corps = paragraphes.length > 1 ? paragraphes.slice(1).join('\n\n') : '';

      document.getElementById('modalTag').innerText = a.type || 'Article';
      document.getElementById('modalTitle').innerText = a.titre;
      document.getElementById('modalAuteur').innerText = a.auteur;
      document.getElementById('modalDate').innerText = date;
      document.getElementById('modalChapeau').innerText = chapeau;
      document.getElementById('modalContent').innerText = corps;
      document.getElementById('modal').classList.add('show');
      document.getElementById('overlay').classList.add('show');
      document.body.style.overflow = 'hidden';
    };

    window.closeModal = function() {
      document.getElementById('modal').classList.remove('show');
      document.getElementById('overlay').classList.remove('show');
      document.body.style.overflow = '';
    };

    // ── FILTRES & RECHERCHE ──
    window.setFilter = function(type, btn) {
      currentFilter = type;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      afficher();
    };

    document.getElementById('searchInput').addEventListener('input', afficher);

    charger();
  </script>
</body>
</html>
