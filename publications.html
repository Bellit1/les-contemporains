<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le Contemporain | Publications</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rouge: #c8102e;
      --noir: #111111;
      --gris: #f2f2f2;
      --blanc: #ffffff;
      --texte: #333333;
      --texte-leger: #777777;
    }
    body { font-family: 'Source Sans 3', sans-serif; background-color: var(--gris); color: var(--texte); min-height: 100vh; }

    nav { background-color: var(--noir); padding: 0 40px; display: flex; align-items: center; justify-content: space-between; height: 64px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 12px rgba(0,0,0,0.4); }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; font-weight: 900; color: var(--blanc); text-decoration: none; letter-spacing: 1px; }
    .nav-logo span { color: var(--rouge); }
    .nav-links { display: flex; gap: 6px; }
    .nav-links a { color: #ccc; text-decoration: none; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.2px; padding: 8px 16px; border-radius: 4px; transition: all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--blanc); background-color: var(--rouge); }

    .page-header { background-color: var(--noir); color: var(--blanc); text-align: center; padding: 40px 20px; border-bottom: 4px solid var(--rouge); }
    .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 900; }

    .toolbar { max-width: 900px; margin: 30px auto 20px; padding: 0 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: center; justify-content: space-between; }
    .toolbar input { flex: 1; min-width: 200px; padding: 10px 16px; border: 1px solid #ddd; border-radius: 6px; font-size: 0.95rem; font-family: inherit; outline: none; }
    .toolbar input:focus { border-color: var(--rouge); }
    .filters { display: flex; gap: 8px; flex-wrap: wrap; }
    .filters button { background-color: var(--blanc); border: 2px solid #ddd; color: var(--texte); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: 600; font-size: 0.85rem; transition: all 0.2s; }
    .filters button:hover, .filters button.active { background-color: var(--rouge); border-color: var(--rouge); color: white; }

    .articles { max-width: 900px; margin: 0 auto 60px; padding: 0 20px; display: flex; flex-direction: column; gap: 16px; }

    .article-card { background-color: var(--blanc); padding: 24px; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,0.07); cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border-left: 4px solid transparent; }
    .article-card:hover { transform: translateX(4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); border-left-color: var(--rouge); }
    .card-tag { background-color: var(--rouge); color: white; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 3px 10px; border-radius: 2px; display: inline-block; margin-bottom: 10px; }
    .article-card h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: var(--noir); margin-bottom: 8px; }
    .article-card .meta { font-size: 0.82rem; color: #aaa; margin-bottom: 10px; }
    .article-card p { color: var(--texte-leger); font-size: 0.95rem; line-height: 1.6; }

    .empty-msg { text-align: center; color: var(--texte-leger); padding: 60px 0; font-size: 1.1rem; }

    /* Modal */
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); z-index: 200; display: none; }
    .overlay.show { display: block; }
    .modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 800px; max-height: 88vh; overflow-y: auto; background: var(--blanc); border-radius: 12px; z-index: 201; display: none; box-shadow: 0 30px 80px rgba(0,0,0,0.3); }
    .modal.show { display: block; }
    .modal-inner { padding: 40px; }
    .modal-tag { background-color: var(--rouge); color: white; font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 3px 10px; border-radius: 2px; display: inline-block; margin-bottom: 16px; }
    .modal h2 { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--noir); margin-bottom: 10px; line-height: 1.3; }
    .modal .meta { font-size: 0.85rem; color: #aaa; margin-bottom: 24px; padding-bottom: 20px; border-bottom: 1px solid #eee; }
    .modal-content { font-size: 1.05rem; line-height: 1.85; color: var(--texte); white-space: pre-wrap; }
    .modal-close { position: absolute; top: 16px; right: 20px; background: none; border: none; font-size: 1.6rem; cursor: pointer; color: #aaa; line-height: 1; }
    .modal-close:hover { color: var(--rouge); }

    footer { background-color: var(--noir); color: #777; padding: 20px; text-align: center; font-size: 0.85rem; }
    footer span { color: var(--rouge); }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="index.html">Le <span>Contemporain</span></a>
    <div class="nav-links">
      <a href="index.html">Accueil</a>
      <a href="publications.html" class="active">Publications</a>
      <a href="publier.html">Publier</a>
    </div>
  </nav>

  <div class="page-header">
    <h1>Publications</h1>
  </div>

  <div class="toolbar">
    <input type="text" id="searchInput" placeholder="🔍 Rechercher un article...">
    <div class="filters">
      <button class="active" onclick="setFilter('Tous', this)">Tous</button>
      <button onclick="setFilter('Politique', this)">Politique</button>
      <button onclick="setFilter('Société', this)">Société</button>
      <button onclick="setFilter('Économie', this)">Économie</button>
    </div>
  </div>

  <div class="articles" id="articles">
    <p class="empty-msg">Chargement des articles...</p>
  </div>

  <div class="overlay" id="overlay" onclick="closeModal()"></div>
  <div class="modal" id="modal">
    <div class="modal-inner">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <span class="modal-tag" id="modalTag"></span>
      <h2 id="modalTitle"></h2>
      <p class="meta" id="modalMeta"></p>
      <div class="modal-content" id="modalContent"></div>
    </div>
  </div>

  <footer>
    <p>&copy; 2025 <span>Le Contemporain</span>. Tous droits réservés.</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBSgloqKAOZ1GuV79czpOR3trBtipbM52E",
      authDomain: "les-contemporains-662a6.firebaseapp.com",
      projectId: "les-contemporains-662a6",
      storageBucket: "les-contemporains-662a6.firebasestorage.app",
      messagingSenderId: "430635541529",
      appId: "1:430635541529:web:c0de908b274aee31a3b688"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const container = document.getElementById('articles');

    let allArticles = [];
    let currentFilter = 'Tous';

    async function charger() {
      try {
        const q = query(collection(db, "articles"), orderBy("date", "desc"));
        const snap = await getDocs(q);
        allArticles = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        afficher();
      } catch (err) {
        console.error(err);
        container.innerHTML = '<p class="empty-msg">Erreur lors du chargement.</p>';
      }
    }

    function afficher() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      let liste = allArticles;
      if (currentFilter !== 'Tous') liste = liste.filter(a => a.type === currentFilter);
      if (search) liste = liste.filter(a => a.titre.toLowerCase().includes(search) || a.contenu.toLowerCase().includes(search));

      container.innerHTML = '';
      if (liste.length === 0) { container.innerHTML = '<p class="empty-msg">Aucun article trouvé.</p>'; return; }

      liste.forEach(a => {
        const date = a.date?.toDate ? a.date.toDate().toLocaleDateString('fr-FR') : '';
        const card = document.createElement('div');
        card.className = 'article-card';
        card.onclick = () => openModal(a);
        card.innerHTML = `
          <span class="card-tag">${a.type || 'Article'}</span>
          <h3>${a.titre}</h3>
          <p class="meta">✍️ ${a.auteur} &nbsp;·&nbsp; ${date}</p>
          <p>${a.contenu.substring(0, 220)}...</p>
        `;
        container.appendChild(card);
      });
    }

    window.setFilter = function(type, btn) {
      currentFilter = type;
      document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      afficher();
    };

    window.openModal = function(a) {
      const date = a.date?.toDate ? a.date.toDate().toLocaleDateString('fr-FR') : '';
      document.getElementById('modalTag').innerText = a.type || 'Article';
      document.getElementById('modalTitle').innerText = a.titre;
      document.getElementById('modalMeta').innerText = `Par ${a.auteur}  ·  ${date}`;
      document.getElementById('modalContent').innerText = a.contenu;
      document.getElementById('modal').classList.add('show');
      document.getElementById('overlay').classList.add('show');
      document.body.style.overflow = 'hidden';
    };

    window.closeModal = function() {
      document.getElementById('modal').classList.remove('show');
      document.getElementById('overlay').classList.remove('show');
      document.body.style.overflow = '';
    };

    document.getElementById('searchInput').addEventListener('input', afficher);

    charger();
  </script>
</body>
</html>
