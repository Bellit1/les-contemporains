<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Le Contemporain | Accueil</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --rouge: #c8102e;
      --noir: #111111;
      --gris: #f0f0f0;
      --blanc: #ffffff;
      --texte: #222222;
      --texte-leger: #666666;
    }
    body { font-family: 'Source Sans 3', sans-serif; background-color: var(--gris); color: var(--texte); }

    /* NAV */
    nav {
      background-color: var(--noir);
      padding: 0 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 68px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 16px rgba(0,0,0,0.5);
    }
    .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 900; color: var(--blanc); text-decoration: none; letter-spacing: 1px; }
    .nav-logo span { color: var(--rouge); }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a { color: #bbb; text-decoration: none; font-size: 0.82rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1.3px; padding: 8px 18px; border-radius: 4px; transition: all 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: var(--blanc); background-color: var(--rouge); }

    /* HERO */
    .hero {
      background-color: var(--noir);
      color: var(--blanc);
      text-align: center;
      padding: 80px 20px 60px;
      border-bottom: 5px solid var(--rouge);
      position: relative;
      overflow: hidden;
    }
    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 41px);
    }
    .hero-eyebrow { font-size: 0.75rem; font-weight: 600; letter-spacing: 4px; text-transform: uppercase; color: var(--rouge); margin-bottom: 16px; }
    .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 7vw, 6rem); font-weight: 900; letter-spacing: 2px; margin-bottom: 16px; line-height: 1; }
    .hero-line { width: 60px; height: 3px; background: var(--rouge); margin: 0 auto 20px; }
    .hero p { color: #888; font-size: 0.95rem; font-weight: 300; letter-spacing: 3px; text-transform: uppercase; }

    /* SECTION */
    .section-header {
      max-width: 1200px;
      margin: 48px auto 24px;
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .section-header h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--noir); }
    .section-header::after { content: ''; flex: 1; height: 1px; background: #ddd; }

    /* GRID */
    .articles-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 28px;
      max-width: 1200px;
      margin: 0 auto 80px;
      padding: 0 32px;
    }

    .article-card {
      background-color: var(--blanc);
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      transition: transform 0.25s, box-shadow 0.25s;
      display: flex;
      flex-direction: column;
    }
    .article-card:hover { transform: translateY(-5px); box-shadow: 0 12px 36px rgba(0,0,0,0.13); }

    .card-top { padding: 24px 24px 0; }
    .card-tag { background-color: var(--rouge); color: white; font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; padding: 3px 10px; border-radius: 2px; display: inline-block; margin-bottom: 14px; }
    .article-card h2 { font-family: 'Playfair Display', serif; font-size: 1.2rem; color: var(--noir); line-height: 1.45; margin-bottom: 10px; }
    .card-excerpt { color: var(--texte-leger); font-size: 0.92rem; line-height: 1.65; padding: 0 24px; flex: 1; }
    .card-footer { padding: 16px 24px; border-top: 1px solid #f0f0f0; margin-top: 16px; font-size: 0.78rem; color: #aaa; display: flex; justify-content: space-between; align-items: center; }
    .card-author { font-weight: 600; color: #888; }

    .empty-msg { text-align: center; color: var(--texte-leger); font-size: 1.1rem; padding: 80px 0; grid-column: 1 / -1; }

    /* FOOTER */
    footer { background-color: var(--noir); color: #555; padding: 28px; text-align: center; font-size: 0.82rem; letter-spacing: 0.5px; border-top: 3px solid var(--rouge); }
    footer span { color: var(--rouge); }
  </style>
</head>
<body>
  <nav>
    <a class="nav-logo" href="index.html">Le <span>Contemporain</span></a>
    <div class="nav-links">
      <a href="index.html" class="active">Accueil</a>
      <a href="publications.html">Publications</a>
      <a href="publier.html">Publier</a>
    </div>
  </nav>

  <div class="hero">
    <p class="hero-eyebrow">Bienvenue</p>
    <h1>Le Contemporain</h1>
    <div class="hero-line"></div>
    <p>Journalisme · Analyse · Société</p>
  </div>

  <div class="section-header">
    <h2>Derniers articles</h2>
  </div>

  <div class="articles-container" id="articles-container">
    <p class="empty-msg">Chargement des articles...</p>
  </div>

  <footer>
    <p>&copy; 2025 <span>Le Contemporain</span> — Tous droits réservés.</p>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBSgloqKAOZ1GuV79czpOR3trBtipbM52E",
      authDomain: "les-contemporains-662a6.firebaseapp.com",
      projectId: "les-contemporains-662a6",
      storageBucket: "les-contemporains-662a6.firebasestorage.app",
      messagingSenderId: "430635541529",
      appId: "1:430635541529:web:c0de908b274aee31a3b688"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const container = document.getElementById('articles-container');

    async function afficherArticles() {
      try {
        const q = query(collection(db, "articles"), orderBy("date", "desc"));
        const snap = await getDocs(q);
        container.innerHTML = '';
        if (snap.empty) { container.innerHTML = '<p class="empty-msg">Aucun article publié pour le moment.</p>'; return; }
        snap.forEach(doc => {
          const a = doc.data();
          const date = a.date?.toDate ? a.date.toDate().toLocaleDateString('fr-FR') : '';
          const div = document.createElement('div');
          div.className = 'article-card';
          div.innerHTML = `
            <div class="card-top">
              <span class="card-tag">${a.type || 'Article'}</span>
              <h2>${a.titre}</h2>
            </div>
            <p class="card-excerpt">${a.contenu.substring(0, 160)}...</p>
            <div class="card-footer">
              <span class="card-author">✍️ ${a.auteur}</span>
              <span>${date}</span>
            </div>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        console.error(err);
        container.innerHTML = '<p class="empty-msg">Erreur lors du chargement.</p>';
      }
    }
    afficherArticles();
  </script>
</body>
</html>
